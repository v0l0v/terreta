<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https: blob:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    
    <!-- Device Permissions -->
    <meta name="permissions" content="geolocation=(), device-orientation=()">
    
    <!-- PWA Meta Tags -->
    <title>Treasures - Decentralized Geocaching</title>
    <meta name="description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find treasures, and explore the world!" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Treasures" />
    <meta name="application-name" content="Treasures" />
    <meta name="msapplication-TileColor" content="#10b981" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://treasures.to/" />
    <meta property="og:title" content="Treasures - Decentralized Geocaching" />
    <meta property="og:description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find treasures, and explore the world!" />
    <meta property="og:image" content="https://treasures.to/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Treasures - Decentralized Geocaching on the Nostr network" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Treasures - Decentralized Geocaching" />
    <meta property="twitter:description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find treasures, and explore the world!" />
    <meta property="twitter:image" content="https://treasures.to/og-image.png" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- PWA Icons -->
    <link rel="icon" href="/icon-144x144.png" sizes="144x144" type="image/png" />
    <link rel="icon" href="/icon-192x192.png" sizes="192x192" type="image/png" />
    <link rel="icon" href="/icon-512x512.png" sizes="512x512" type="image/png" />

    <!-- Prevent FOUC with minimal inline CSS -->
    <style>
      /* Minimal loading styles to prevent FOUC */
      #root {
        min-height: 100vh;
        background-color: #ffffff;
      }
      
      /* Dark mode support */
      @media (prefers-color-scheme: dark) {
        #root {
          background-color: #0f172a;
          color: #f8fafc;
        }
      }
      
      /* Loading spinner for initial load */
      .initial-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e2e8f0;
        border-top: 3px solid #10b981;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide loading once React takes over */
      .app-loaded .initial-loading {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
