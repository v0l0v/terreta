<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https: blob:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    
    <!-- Device Permissions -->
    <meta name="permissions" content="geolocation=(), device-orientation=()">
    
    <!-- PWA Meta Tags -->
    <title>Treasures - Decentralized Geocaching</title>
    <meta name="description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find treasures, and explore the world!" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Treasures" />
    <meta name="application-name" content="Treasures" />
    <meta name="msapplication-TileColor" content="#10b981" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://treasures.to/" />
    <meta property="og:title" content="Treasures - Decentralized Geocaching" />
    <meta property="og:description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find treasures, and explore the world!" />
    <meta property="og:image" content="https://treasures.to/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Treasures - Decentralized Geocaching on the Nostr network" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Treasures - Decentralized Geocaching" />
    <meta property="twitter:description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find treasures, and explore the world!" />
    <meta property="twitter:image" content="https://treasures.to/og-image.png" />
    
    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
