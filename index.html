<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https: blob:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

    <!-- Device Permissions -->
    <meta name="permissions" content="geolocation=(), device-orientation=()">

    <!-- PWA Meta Tags -->
    <title>Terreta - Decentralized Geocaching</title>
    <meta name="description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find geocaches, and explore the world!" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Terreta" />
    <meta name="application-name" content="Terreta" />
    <meta name="msapplication-TileColor" content="#10b981" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://terreta.de/" />
    <meta property="og:title" content="Terreta - Decentralized Geocaching" />
    <meta property="og:description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find geocaches, and explore the world!" />
    <meta property="og:image" content="https://terreta.de/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Terreta - Decentralized Geocaching on the Nostr network" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Terreta - Decentralized Geocaching" />
    <meta property="twitter:description" content="Discover and hide geocaches on the decentralized Nostr network. Share locations, find geocaches, and explore the world!" />
    <meta property="twitter:image" content="https://terreta.de/og-image.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA Icons -->

    <link rel="icon" href="/icon-192x192.png" sizes="192x192" type="image/png" />
    <link rel="icon" href="/icon-512x512.png" sizes="512x512" type="image/png" />

    <!-- Prevent FOUC with minimal inline CSS -->
    <style>
      /* Minimal loading styles to prevent FOUC */
      body {
        margin: 0;
        padding: 0;
      }

      #root {
        min-height: 100vh;
        background-color: #ffffff;
      }

      /* Loading spinner for initial load - Compass style */
      .initial-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #ffffff;
      }

      .compass-spinner {
        width: 64px;
        height: 64px;
        color: #10b981;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Hide loading once React takes over */
      .app-loaded .initial-loading {
        display: none;
      }

      /* Theme-aware styling - defaults to light */
      html.dark #root,
      html.dark .initial-loading {
        background-color: #0f172a;
      }

      /* Adventure theme support */
      html.adventure #root,
      html.adventure .initial-loading {
        background-color: #f5f1e8;
      }

      html.adventure .compass-spinner {
        color: #78716c;
      }
    </style>
    <script>
      // Apply theme class immediately to prevent flash
      (function() {
        try {
          const storedTheme = localStorage.getItem('ui-theme');
          if (storedTheme && storedTheme !== 'system') {
            // Apply stored theme directly (light, dark, or adventure)
            document.documentElement.classList.add(storedTheme);
          } else if (storedTheme === 'system') {
            // System theme: check user preference
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.classList.add(prefersDark ? 'dark' : 'light');
          } else {
            // No stored theme: default to light
            document.documentElement.classList.add('light');
          }
        } catch (e) {
          // Ignore errors, default to light theme
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Initial loading state with compass -->
      <div class="initial-loading">
        <!-- Compass SVG icon -->
        <svg class="compass-spinner" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
