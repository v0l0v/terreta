version: '3.8'

services:
  treasures:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: treasures-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    labels:
      - "com.treasures.description=Treasures Nostr Geocaching App"
      - "com.treasures.version=1.0.0"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - treasures-network

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - treasures-network
    depends_on:
      - treasures

volumes:
  caddy_data:
  caddy_config:

networks:
  treasures-network:
    driver: bridge