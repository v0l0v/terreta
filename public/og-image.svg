<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <!-- Swirl pattern -->
    <pattern id="swirls" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
      <path d="M 15 25 Q 25 15, 35 25 Q 25 35, 15 25" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <circle cx="75" cy="75" r="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
      <path d="M 65 75 Q 75 65, 85 75 Q 75 85, 65 75" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#swirls)" opacity="0.4"/>
  


  <!-- Title -->
  <text x="600" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="92" font-weight="bold" text-anchor="middle" fill="white" filter="url(#glow)">
    Treasures
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" text-anchor="middle" fill="#d1fae5">
    Decentralized Geocaching
  </text>
  
  <!-- Tagline -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="24" text-anchor="middle" fill="#a7f3d0">
    Discover hidden treasures on the Nostr network
  </text>
  

  
  <!-- Domain name at bottom -->
  <text x="600" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" text-anchor="middle" fill="#6ee7b7">
    treasures.to
  </text>
  
  <!-- Simple Nostr network visualization -->
  <g transform="translate(600, 430)">
    <!-- Connected nodes representing decentralized network -->
    <circle cx="-30" cy="0" r="8" fill="#a7f3d0" opacity="0.8"/>
    <circle cx="-10" cy="0" r="8" fill="#a7f3d0" opacity="0.8"/>
    <circle cx="10" cy="0" r="8" fill="#a7f3d0" opacity="0.8"/>
    <circle cx="30" cy="0" r="8" fill="#a7f3d0" opacity="0.8"/>
    <path d="M -22 0 L 22 0" stroke="#a7f3d0" stroke-width="2" opacity="0.6"/>
    <text x="0" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="16" text-anchor="middle" fill="#a7f3d0" opacity="0.8">
      Powered by Nostr
    </text>
  </g>
</svg>